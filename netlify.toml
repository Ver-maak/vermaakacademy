# Netlify deployment config for the TanStack Start app.
# Nitro auto-detects the Netlify preset during `bun run build` (NETLIFY=true
# is set in the build env) and emits a Netlify Function plus the static
# client assets under .netlify/, which Netlify wires up automatically.

[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  # Pin the Nitro preset explicitly so the build target stays deterministic.
  NITRO_PRESET = "netlify"
